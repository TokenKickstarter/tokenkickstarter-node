# Custom Pallets

## pallet-adaptive-gas

**Location:** `pallets/pallet-adaptive-gas/`

Automatically scales block gas limits based on real-time utilization.

### How It Works

Each block, the pallet measures gas consumed vs. gas limit. Under high utilization, the limit increases; under low utilization, it decreases — similar to EIP-1559's base fee adjustment.

### Parameters

| Parameter | Default |
|-----------|---------|
| `MinGasLimit` | ~1,500 tx equivalent |
| `MaxGasLimit` | ~80,000 tx equivalent |
| `AdjustmentFactor` | 1/8 per block |
| `TargetUtilization` | 50% |

No extrinsics — adjusts automatically via `on_finalize`.

---

## pallet-hyperswarm-anchor

**Location:** `pallets/pallet-hyperswarm-anchor/`

Anchors [HyperSwarm](https://github.com/holepunchto/hyperswarm) DHT discovery keys to Layer-1 finality.

### What is HyperSwarm?

A P2P networking DHT protocol where apps announce themselves with a 32-byte public key. Anchoring on-chain provides tamper-proof, censorship-resistant registration.

### Extrinsics

- `anchor(key: [u8; 32])` — Register/update DHT key
- `revoke()` — Remove anchored key

### Storage

| Item | Type |
|------|------|
| `Anchors` | Map `AccountId20 → [u8; 32]` |

---

## pallet-name-registry

**Location:** `pallets/pallet-name-registry/`

Free (zero-deposit) human-readable on-chain names like `alice.tks`.

### Design

- No deposit required
- First-come, first-served
- Transferable ownership
- Substrate-native (queryable via EVM precompiles)

### Extrinsics

- `register(name: Vec<u8>)` — Register a name
- `transfer(name, dest)` — Transfer to another account
- `deregister(name)` — Release a name

### Storage

| Item | Type |
|------|------|
| `Names` | Map `Vec<u8> → AccountId20` |
| `OwnedNames` | Map `AccountId20 → Vec<Vec<u8>>` |

---

## pallet-shard-registry

**Location:** `pallets/pallet-shard-registry/`

Coordination layer for registering and tracking TKS shards (logical sub-chains).

### Extrinsics

- `register_shard(shard_id: u32, config_hash: [u8; 32])` — Register a shard
- `deregister_shard(shard_id: u32)` — Remove a shard (sudo-gated)

### Storage

| Item | Type |
|------|------|
| `Shards` | Map `u32 → ShardInfo` |
| `ShardCount` | `u32` |

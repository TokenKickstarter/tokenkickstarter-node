## Rust Toolchain

`rust-toolchain.toml`:
```toml
[toolchain]
channel = "stable"
targets = ["wasm32-unknown-unknown"]
components = ["rust-src"]
```

---

## WASM Build Note

The runtime compiles to WASM via `substrate-wasm-builder`. CI sets:

```yaml
WASM_BUILD_RUSTFLAGS: "-C link-arg=--allow-undefined"
```

Required for Rust ≥ 1.88: allows Substrate host functions (`ext_storage_*`, `ext_hashing_*`) to be treated as WASM imports rather than undefined link errors.

---


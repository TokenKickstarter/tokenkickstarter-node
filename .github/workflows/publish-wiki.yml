# Security

## Responsible Disclosure

**Do not open a public GitHub Issue for security vulnerabilities.**

Send reports to: **security@tokenkickstarter.com**

Include:
- Description of the vulnerability
- Steps to reproduce
- Potential impact
- Suggested mitigations (optional)

Response: 48 hours acknowledgment, 7 days status update.

---

## Severity & Response Time

| Severity | Description | Response |
|----------|-------------|----------|
| Critical | Fund loss, consensus failure, RCE | 24 hours |
| High | Chain disruption, auth bypass | 3 days |
| Medium | DoS, data integrity | 7 days |
| Low | Info disclosure, config issues | 30 days |

---

## Operator Security Checklist

### Firewall

| Port | Expose To | Purpose |
|------|-----------|---------|
| `30333` | Public | P2P (required) |
| `9944` | Trusted IPs only | RPC |
| `9615` | Internal | Prometheus |

### Keystore

```bash
chmod 700 ~/.tks/validator/chains/tks_network/keystore/
```

Never copy keystore to untrusted machines.

### RPC

- Never expose `author_insertKey` publicly
- Use TLS (`wss://`) for any public endpoints
- Use a reverse proxy with authentication

### Validator Keys

- Stash account = bonded funds (cold storage, never online)
- Controller account = day-to-day staking
- Keystore = session keys only (not stash private key)

---

## Current Limitations

- **Sudo governance** — `pallet-sudo` is a centralized admin key. Will be replaced by on-chain governance for mainnet.
- **Testnet phase** — Tokens have no monetary value. Infrastructure may reset.

---

## Audit Status

| Component | Status |
|-----------|--------|
| Custom pallets | Pending |
| Runtime configuration | Pending |
| Network scripts | Pending |

Community security reviews are welcome prior to formal audits.

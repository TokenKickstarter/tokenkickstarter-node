name: Publish Wiki

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force overwrite existing pages
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish-wiki:
    name: Build and publish wiki
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write wiki pages
        run: |
          mkdir -p /tmp/wiki
          cat > /tmp/wiki/Home.md << 'WIKI_EOF'

## Ethereum JSON-RPC

### Core Methods

```bash
# Block number
curl -s -X POST -H "Content-Type: application/json" \
  -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
  http://localhost:9944

# Account balance
curl -s -X POST -H "Content-Type: application/json" \
  -d '{"jsonrpc":"2.0","method":"eth_getBalance","params":["0xYOUR_ADDRESS","latest"],"id":1}' \
  http://localhost:9944

# Send transaction
curl -s -X POST -H "Content-Type: application/json" \
  -d '{"jsonrpc":"2.0","method":"eth_sendRawTransaction","params":["0x02f8..."],"id":1}' \
  http://localhost:9944
```

### Methods Reference

| Method | Description |
|--------|-------------|
| `eth_blockNumber` | Current block number |
| `eth_getBalance` | Account TKS balance |
| `eth_getTransactionCount` | Account nonce |
| `eth_getBlockByNumber` | Block by number |
| `eth_getBlockByHash` | Block by hash |
| `eth_getTransactionByHash` | Transaction details |
| `eth_getTransactionReceipt` | Transaction receipt |
| `eth_sendRawTransaction` | Submit signed tx |
| `eth_call` | Read-only contract call |
| `eth_estimateGas` | Gas estimation |
| `eth_gasPrice` | Current gas price |
| `eth_feeHistory` | Historical fee data |
| `eth_getLogs` | Event log query |
| `eth_chainId` | Chain ID (7779) |
| `net_peerCount` | Connected peers |
| `txpool_status` | Transaction pool |

---

## Substrate RPC

```bash
# Generate session keys (validators)
curl -s -X POST -H "Content-Type: application/json" \
  -d '{"jsonrpc":"2.0","method":"author_rotateKeys","params":[],"id":1}' \
  http://localhost:9944

# Node health
curl -s -X POST -H "Content-Type: application/json" \
  -d '{"jsonrpc":"2.0","method":"system_health","params":[],"id":1}' \
  http://localhost:9944

# Finalized block
curl -s -X POST -H "Content-Type: application/json" \
  -d '{"jsonrpc":"2.0","method":"chain_getFinalizedHead","params":[],"id":1}' \
  http://localhost:9944
```

### Methods Reference

| Method | Description |
|--------|-------------|
| `author_rotateKeys` | Generate session keys |
| `author_insertKey` | Insert key to keystore |
| `author_submitExtrinsic` | Submit extrinsic |
| `chain_getBlock` | Latest or specific block |
| `chain_getBlockHash` | Block hash by number |
| `chain_getFinalizedHead` | Latest finalized hash |
| `state_getStorage` | Read storage value |
| `state_getRuntimeVersion` | Runtime spec version |
| `system_health` | Node health |
| `system_peers` | Connected peers |
| `system_version` | Node version |

---

## WebSocket Subscriptions

```javascript
const ws = new WebSocket("ws://localhost:9944");
ws.onopen = () => {
  ws.send(JSON.stringify({
    jsonrpc: "2.0",
    method: "chain_subscribeNewHeads",
    params: [],
    id: 1,
  }));
};
```

| Subscription | Description |
|-------------|-------------|
| `chain_subscribeNewHeads` | New block headers |
| `chain_subscribeFinalizedHeads` | Finalized block headers |
| `state_subscribeStorage` | Storage changes |
| `eth_subscribe("newHeads")` | Ethereum block headers |
| `eth_subscribe("logs")` | EVM event logs |

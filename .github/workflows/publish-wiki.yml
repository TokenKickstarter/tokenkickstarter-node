# Architecture

## Repository Layout

```
tokenkickstarter-node/
├── node/                   Binary — networking, RPC, consensus client
│   └── src/
│       ├── main.rs
│       ├── chain_spec.rs   Genesis configuration
│       ├── service.rs      Full-node service (P2P, sync, consensus)
│       └── rpc.rs          RPC handler registration
│
├── runtime/                WASM runtime — all on-chain business logic
│   └── src/
│       ├── lib.rs          construct_runtime! + pallet configs
│       └── precompiles.rs  EVM precompile registration
│
├── pallets/                Custom Substrate pallets
│   ├── pallet-adaptive-gas/
│   ├── pallet-hyperswarm-anchor/
│   ├── pallet-name-registry/
│   └── pallet-shard-registry/
│
├── cipher-relay/           Encrypted relay helper library
│
└── network/                Operator tooling
    ├── tks-testnet-spec-raw.json
    ├── start-node.sh / start-validator.sh
    ├── tks-node.service
    └── docker-compose.yml
```

---

## Consensus Model

```
┌─────────────────────────────────────────────────┐
│  BLOCK PRODUCTION: Aura (Authority Round)        │
│  - Fixed authority set, round-robin slots        │
│  - Slot duration: 1,000ms                        │
└─────────────────────┬───────────────────────────┘
                      │
                      ▼
┌─────────────────────────────────────────────────┐
│  BLOCK FINALITY: GRANDPA                         │
│  - Byzantine fault tolerant (up to 1/3 offline) │
│  - Deterministic, not probabilistic              │
│  - Finalizes in 2–4 seconds under normal load    │
└─────────────────────────────────────────────────┘
```

---

## Account Model

TKS uses **Ethereum-style accounts** (`AccountId20`):

- 20-byte addresses (Ethereum-compatible)
- `secp256k1` key pairs, ECDSA signatures
- Works with MetaMask, Ledger, Trezor out of the box

---

## EVM Layer (Frontier)

```
Ethereum dApp / MetaMask
         │
         ▼ eth_* JSON-RPC
   pallet-ethereum    ← Ethereum tx types, block/receipt storage
         │
         ▼
   pallet-evm         ← EVM bytecode execution (SputnikVM)
         │
         ▼
   pallet-base-fee    ← EIP-1559 base fee
   pallet-dynamic-fee ← Dynamic fee adjustment
```

---

## Storage Backend

- **Database:** RocksDB (via `kvdb-rocksdb`)
- **State:** Merkle Patricia Trie (same as Ethereum)
- **Compression:** zstd

This enables light client support, state root proofs, and cross-chain bridge verification.

---

## Runtime Upgrades

1. Compile new WASM runtime
2. Submit `system.setCode(blob)` via sudo or governance
3. Nodes automatically detect and switch — no restart required

## Pull Request Workflow

1. Fork the repo
2. Create a branch: `git checkout -b feat/my-feature`
3. Make changes, add tests
4. Run: `cargo fmt --all && cargo clippy --workspace -- -D warnings && cargo test --workspace`
5. Commit and open PR against `main`

### Commit Format

```
<type>: <short description>
```

| Type | Use |
|------|-----|
| `feat` | New feature |
| `fix` | Bug fix |
| `ci` | CI/CD changes |
| `docs` | Documentation |
| `refactor` | Restructure |
| `test` | Tests |
| `chore` | Dependencies |

---

## Adding a Custom Pallet

1. Create `pallets/pallet-your-pallet/` with `Cargo.toml` and `src/lib.rs`
2. Add to root `Cargo.toml` workspace members
3. Add to `runtime/Cargo.toml`
4. Add to `construct_runtime!` in `runtime/src/lib.rs`
5. Implement the `Config` trait


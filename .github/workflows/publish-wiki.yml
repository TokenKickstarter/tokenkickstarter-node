name: Publish Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/wiki/**']

permissions:
  contents: write

jobs:
  publish:
    name: Publish wiki pages
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          if git clone "$WIKI_URL" wiki 2>/dev/null; then
            echo "Cloned existing wiki repo"
          else
            echo "Initializing fresh wiki repo"
            mkdir wiki && cd wiki
            git init -b master
            git remote add origin "$WIKI_URL"
            cd ..
          fi

          cp .github/wiki/*.md wiki/
          cd wiki

          if git diff --quiet && git status --short | grep -q '^$'; then
            echo "No changes"
            exit 0
          fi

          git add -A
          git commit -m "docs: update wiki (automated)"
          git push origin HEAD:master --force
          echo "Wiki published to https://github.com/${REPO}/wiki"

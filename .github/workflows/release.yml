name: TKS Node Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.4.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build macOS (ARM64 + x86_64) ─────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-14  # Apple Silicon
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          ARCH=$(echo "${{ matrix.target }}" | sed 's/-apple-darwin//' | sed 's/aarch64/arm64/' | sed 's/x86_64/amd64/')
          cp target/${{ matrix.target }}/release/tks-chain-node \
             tks-chain-node-${VERSION}-macos-${ARCH}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: tks-chain-node-*

  # ── Build Linux (AMD64 + ARM64) ──────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          cp target/${{ matrix.target }}/release/tks-chain-node \
             tks-chain-node-${VERSION}-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: tks-chain-node-*

  # ── Build Windows ────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Rename binary
        shell: bash
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          cp target/release/tks-chain-node.exe \
             tks-chain-node-${VERSION}-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: tks-chain-node-*.exe

  # ── Generate Chainspec & Create Release ──────────────────
  release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Install Rust (for chainspec generation)
        uses: dtolnay/rust-toolchain@stable

      - name: Build native binary for chainspec
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Generate chainspec files
        run: |
          ./target/x86_64-unknown-linux-gnu/release/tks-chain-node \
            build-spec --chain=local > release-files/tks-testnet-spec.json
          ./target/x86_64-unknown-linux-gnu/release/tks-chain-node \
            build-spec --chain=release-files/tks-testnet-spec.json --raw \
            > release-files/tks-testnet-spec-raw.json
          echo "Chainspec files generated"

      - name: Copy network scripts
        run: |
          cp network/start-node.sh release-files/
          cp network/start-node.bat release-files/
          cp network/start-validator.sh release-files/
          cp network/start-bootnode.sh release-files/
          cp network/inject-validator-keys.sh release-files/
          cp network/purge-chain.sh release-files/
          cp network/install.sh release-files/
          cp network/server-setup.sh release-files/
          cp network/tks-node.service release-files/
          cp network/tks-bootnode.service release-files/
          cp network/README.md release-files/
          chmod +x release-files/*.sh

      - name: Generate checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TKS Node ${{ github.ref_name }}
          body: |
            ## TKS Node Release ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (M1/M2/M3) | `tks-chain-node-*-macos-arm64` |
            | macOS | Intel | `tks-chain-node-*-macos-amd64` |
            | Linux | x86_64 | `tks-chain-node-*-linux-amd64` |
            | Linux | ARM64 | `tks-chain-node-*-linux-arm64` |
            | Windows | x86_64 | `tks-chain-node-*-windows-amd64.exe` |

            ### Quick Start

            ```bash
            # Mac/Linux one-liner
            curl -sSf https://raw.githubusercontent.com/tokenkickstarter/tks-node/${{ github.ref_name }}/network/install.sh | bash
            ```

            ### Join the Network

            ```bash
            ./tks-chain-node \
              --chain tks-testnet-spec-raw.json \
              --bootnodes /ip4/BOOTNODE_IP/tcp/30333/p2p/12D3KooWNaz3nEXYRCWJUtEFXrpo2DpiuM1XuRuZ9HsKR2GDh9tT \
              --base-path ~/.tks/data \
              --rpc-external --rpc-cors all
            ```

            ### Network Info
            - Token: **TKS** (18 decimals)
            - Consensus: **Aura + GRANDPA**
            - P2P Port: **30333**
            - RPC Port: **9944**

            See [README.md](./README.md) for full documentation.
          files: release-files/*
          draft: false
          prerelease: false

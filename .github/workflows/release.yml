name: TKS Node Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.5.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── macOS: Apple Silicon + Intel ─────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown
          components: rust-src

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-v2-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-${{ matrix.target }}-

      - name: Install system dependencies
        run: |
          HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install protobuf llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> $GITHUB_ENV
          echo "LDFLAGS=-L${LLVM_PREFIX}/lib" >> $GITHUB_ENV
          echo "${LLVM_PREFIX}/bin" >> $GITHUB_PATH

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          cp target/${{ matrix.target }}/release/tks-chain-node \
             tks-chain-node-${VERSION}-macos-${{ matrix.arch }}
          chmod +x tks-chain-node-${VERSION}-macos-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: tks-chain-node-*

  # ── Linux: x86_64 + ARM64 ────────────────────────────────────────
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config \
            clang libclang-dev protobuf-compiler

      - name: Install cross-compilation tools (arm64)
        if: matrix.cross
        run: |
          # Add arm64 architecture for cross-compilation OpenSSL
          sudo dpkg --add-architecture arm64
          sudo sed -i 's|^deb |deb [arch=amd64] |g' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libssl-dev:arm64
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Install OpenSSL (amd64)
        if: "!matrix.cross"
        run: sudo apt-get install -y libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown
          components: rust-src

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-v2-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-${{ matrix.target }}-

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          cp target/${{ matrix.target }}/release/tks-chain-node \
             tks-chain-node-${VERSION}-linux-${{ matrix.arch }}
          chmod +x tks-chain-node-${VERSION}-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: tks-chain-node-*

  # ── Windows: x86_64 ──────────────────────────────────────────────
  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-v2-amd64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-amd64-

      - name: Install LLVM/Clang (required by rocksdb)
        run: choco install llvm -y
        shell: powershell

      - name: Build
        run: cargo build --release
        env:
          LIBCLANG_PATH: 'C:\Program Files\LLVM\bin'

      - name: Package binary
        shell: bash
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          cp target/release/tks-chain-node.exe \
             tks-chain-node-${VERSION}-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: tks-chain-node-*.exe

  # ── Create GitHub Release ─────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;

          # Copy network scripts
          cp network/start-node.sh       release-files/
          cp network/start-node.bat      release-files/
          cp network/start-validator.sh  release-files/
          cp network/start-bootnode.sh   release-files/
          cp network/inject-validator-keys.sh release-files/
          cp network/purge-chain.sh      release-files/
          cp network/install.sh          release-files/
          cp network/server-setup.sh     release-files/
          cp network/tks-node.service    release-files/
          cp network/tks-bootnode.service release-files/
          cp network/README.md           release-files/
          chmod +x release-files/*.sh

          ls -lh release-files/

      - name: Install Rust (for chainspec)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps for chainspec build
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev clang libclang-dev protobuf-compiler

      - name: Build native binary for chainspec generation
        run: cargo build --release

      - name: Generate chainspec files
        run: |
          ./target/release/tks-chain-node \
            build-spec --chain=local > release-files/tks-testnet-spec.json
          ./target/release/tks-chain-node \
            build-spec --chain=release-files/tks-testnet-spec.json --raw \
            > release-files/tks-testnet-spec-raw.json
          echo "✅ Chainspec generated"

      - name: Generate SHA256 checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TKS Node ${{ github.ref_name || github.event.inputs.version }}
          body: |
            ## 🚀 TKS Node ${{ github.ref_name || github.event.inputs.version }}

            > Layer-1 Substrate blockchain with EVM compatibility, HyperSwarm DHT anchoring,
            > adaptive gas, native NFTs, and free name registry on 1-second blocks.

            ---

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | 🍎 macOS | Apple Silicon (M1/M2/M3/M4) | `tks-chain-node-*-macos-arm64` |
            | 🍎 macOS | Intel (x86_64) | `tks-chain-node-*-macos-amd64` |
            | 🐧 Linux | x86_64 (servers, VPS) | `tks-chain-node-*-linux-amd64` |
            | 🐧 Linux | ARM64 (Raspberry Pi, VPS) | `tks-chain-node-*-linux-arm64` |
            | 🪟 Windows | x86_64 | `tks-chain-node-*-windows-amd64.exe` |

            ---

            ### ⚡ Quick Install (Linux/macOS)

            ```bash
            curl -sSf https://raw.githubusercontent.com/TokenKickstarter/tokenkickstarter-node/${{ github.ref_name }}/network/install.sh | bash
            ```

            ### 🔌 Join the TKS Network

            ```bash
            ./tks-chain-node \
              --chain tks-testnet-spec-raw.json \
              --base-path ~/.tks/data \
              --rpc-external --rpc-cors all \
              --name "MyNode"
            ```

            ### ⛏️ Run as Validator

            ```bash
            # See network/start-validator.sh for full setup
            ./tks-chain-node \
              --chain tks-testnet-spec-raw.json \
              --validator \
              --name "MyValidator"
            ```

            ---

            ### Network Info

            | | |
            |-|-|
            | **Chain ID** | 7779 (`0x1E63`) |
            | **Token** | TKS (18 decimals) |
            | **Block Time** | ~1 second |
            | **Consensus** | Aura + GRANDPA |
            | **P2P Port** | 30333 |
            | **RPC Port** | 9944 |

            ---

            See [README.md](https://github.com/TokenKickstarter/tokenkickstarter-node#readme) for full documentation.
          files: release-files/*
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name || github.event.inputs.version }}

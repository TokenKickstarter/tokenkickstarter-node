name: Build TKS Chain Node (Multi-Platform)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: tks-chain-node-linux-x86_64
            binary_name: tks-chain-node
            archive_ext: tar.gz

          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: tks-chain-node-macos-arm64
            binary_name: tks-chain-node
            archive_ext: tar.gz

          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: tks-chain-node-macos-x86_64
            binary_name: tks-chain-node
            archive_ext: tar.gz

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_name: tks-chain-node-windows-x86_64
            binary_name: tks-chain-node.exe
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rust-toolchain.toml (channel = "stable") drives the version.
      # We only add extra targets here — no pinned version override.
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}
          components: rust-src

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ matrix.target }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-v2-

      # Platform deps
      - name: Install Dependencies (Linux base)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            protobuf-compiler libclang-dev \
            build-essential pkg-config libssl-dev

      - name: Install Dependencies (Linux arm64 cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo dpkg --add-architecture arm64
          sudo sed -i 's|^deb |deb [arch=amd64] |g' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update -y
          sudo apt-get install -y libssl-dev:arm64
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/aarch64-linux-gnu" >> $GITHUB_ENV


      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install protobuf llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LIBCLANG_PATH=${LLVM_PREFIX}/lib" >> $GITHUB_ENV
          echo "LDFLAGS=-L${LLVM_PREFIX}/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I${LLVM_PREFIX}/include" >> $GITHUB_ENV
          echo "${LLVM_PREFIX}/bin" >> $GITHUB_PATH


      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm protoc -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $GITHUB_ENV
        shell: bash

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} \
             ${{ matrix.artifact_name }}
          tar -czf ${{ matrix.artifact_name }}-${VERSION}.tar.gz \
              ${{ matrix.artifact_name }}

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} \
             ${{ matrix.artifact_name }}.exe
          7z a ${{ matrix.artifact_name }}-${VERSION}.zip \
              ${{ matrix.artifact_name }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}-*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          cp network/start-node.sh network/start-node.bat \
             network/start-validator.sh network/start-bootnode.sh \
             network/inject-validator-keys.sh network/purge-chain.sh \
             network/install.sh network/server-setup.sh \
             network/tks-node.service network/tks-bootnode.service \
             network/README.md release-files/
          chmod +x release-files/*.sh
          ls -lh release-files/

      - name: SHA256 checksums
        run: cd release-files && sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "TKS Node ${{ github.ref_name }}"
          body: |
            ## TKS Node ${{ github.ref_name }}

            Layer-1 Substrate blockchain with EVM compatibility, HyperSwarm DHT anchoring, adaptive gas, native NFTs, and 1-second block finality.

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (M1/M2/M3/M4) | `tks-chain-node-macos-arm64-*.tar.gz` |
            | macOS | Intel (x86_64) | `tks-chain-node-macos-x86_64-*.tar.gz` |
            | Linux | x86_64 | `tks-chain-node-linux-x86_64-*.tar.gz` |
            | Windows | x86_64 | `tks-chain-node-windows-x86_64-*.zip` |

            ### Quick Install (Linux/macOS)

            ```bash
            curl -sSf https://raw.githubusercontent.com/TokenKickstarter/tokenkickstarter-node/${{ github.ref_name }}/network/install.sh | bash
            ```

            ### Network Info

            | | |
            |-|-|
            | Chain ID | 7779 (`0x1E63`) |
            | Token | TKS (18 decimals) |
            | Block Time | 1 second |
            | RPC Port | 9944 |
          files: release-files/*
          draft: false
          prerelease: false

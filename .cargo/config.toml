# TKS Substrate Node — Cargo workspace config
#
# [target.wasm32-unknown-unknown]
# rust-lld in Rust >= 1.88 uses a stricter WASM linking model by default.
# Substrate's host functions (ext_storage_*, ext_hashing_*, etc.) are WASM
# imports that must be allowed as "undefined" at link time — they are resolved
# by the Substrate host environment at runtime, not at compile time.
# Without --allow-undefined, rust-lld emits "undefined symbol: ext_*" errors.

[target.wasm32-unknown-unknown]
rustflags = [
  "-C", "link-arg=--allow-undefined",
]
